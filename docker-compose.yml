# ============================================================================
# docker-compose.yml - CRM Conversacional com todos os serviços
# ============================================================================
# Uso: docker-compose up -d
# ============================================================================

version: '3.8'

services:
  # -------------------- APLICAÇÃO FLASK --------------------
  web:
    build: .
    container_name: crm_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/crm.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Persistir banco de dados SQLite
      - crm_data:/app/instance
      # Persistir uploads de arquivos
      - uploads_data:/app/static/uploads
      # Logs
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------- REDIS (Cache e Rate Limiting) --------------------
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # -------------------- NGINX (Proxy reverso - opcional) --------------------
  nginx:
    image: nginx:alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - ./ssl:/ssl:ro  # Para certificados SSL
    depends_on:
      - web
    networks:
      - crm_network
    profiles:
      - production  # Só ativar com --profile production

# -------------------- VOLUMES (Persistência) --------------------
volumes:
  crm_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  redis_data:
    driver: local

# -------------------- REDES --------------------
networks:
  crm_network:
    driver: bridge