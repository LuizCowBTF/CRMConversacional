services:
  web:
    build: .
    container_name: crm_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/crm.db
    volumes:
      - crm_data:/app/instance
      - uploads_data:/app/static/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  crm_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
